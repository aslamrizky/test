name: CI/CD Pipeline Maven

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master, develop]

env:
  JAVA_VERSION: '17'

jobs:
  build:
    name: "CI - Build with Maven"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'
      - run: mvn -B compile
      - run: mvn -B package -DskipTests
      - uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar

  test:
    name: "CT - Unit Test & Coverage"
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'
      - run: mvn -B test

  inspect:
    name: "Inspection - Checkstyle & PMD"
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Run Checkstyle
        run: mvn -B checkstyle:check

      - name: Run PMD
        run: mvn -B pmd:check pmd:cpd-check

      - name: Upload inspection reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: inspection-reports
          path: |
            target/checkstyle-result.xml
            target/pmd.xml
            
  deploy:
    name: "CD - Build & Push Docker Image"
    runs-on: ubuntu-latest
    needs: [test, inspect]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/calculator-app:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/calculator-app:${{ github.sha }}
