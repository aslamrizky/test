name: CI/CD Pipeline Maven

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master, develop]

env:
  JAVA_VERSION: '17'

jobs:
  build:
    name: "CI - Build with Maven"
    runs-on: ubuntu-latest
    outputs:
      app_version: ${{ steps.version.outputs.app_version }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Determine build version
        id: version
        run: |
          if [ "${{ github.ref }}" = "refs/heads/master" ] && [ "${{ github.event_name }}" = "push" ]; then
            APP_VERSION="1.0.${{ github.run_number }}"
          else
            APP_VERSION="1.0.${{ github.run_number }}-SNAPSHOT"
          fi
          echo "Building version $APP_VERSION"
          echo "app_version=$APP_VERSION" >> "$GITHUB_OUTPUT"

      - name: Bump project version for this build
        run: mvn -B versions:set -DnewVersion=${{ steps.version.outputs.app_version }} -DgenerateBackupPoms=false

      - run: mvn -B compile
      - run: mvn -B package -DskipTests -Dbuild.number=${{ github.run_number }}

      - uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar

  test:
    name: "CT - Unit Test & Coverage"
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'
      - run: mvn -B test

  inspect:
    name: "Inspection - Checkstyle & PMD"
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Run Checkstyle
        run: mvn -B checkstyle:check

      - name: Run PMD
        run: mvn -B pmd:check pmd:cpd-check

      - name: Upload inspection reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: inspection-reports
          path: |
            target/checkstyle-result.xml
            target/pmd.xml

  release:
    name: "Release - Publish Versioned Jar"
    runs-on: ubuntu-latest
    needs: [build, test, inspect]
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: target

      - name: Create GitHub release for this jar version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.build.outputs.app_version }}"
          gh release create "v$VERSION" target/*.jar \
            --title "calculator-app v$VERSION" \
            --notes "Automated build #${{ github.run_number }} from commit ${{ github.sha }}." \
            --repo "${{ github.repository }}"

  deploy:
    name: "CD - Build & Push Docker Image"
    runs-on: ubuntu-latest
    needs: [build, test, inspect]
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          build-args: |
            APP_VERSION=${{ needs.build.outputs.app_version }}
            BUILD_NUMBER=${{ github.run_number }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/calculator-app:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/calculator-app:${{ needs.build.outputs.app_version }}
            ${{ secrets.DOCKERHUB_USERNAME }}/calculator-app:${{ github.sha }}
